server.port=8082
spring.application.name=ms-logistica

# ───────────────────────────────────────────────────────────
# Persistencia: base de datos H2 embebida en archivo
# (cumple el requisito de persistencia real mediante JPA)
# ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/logistica-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Consola web de H2 (http://localhost:8082/h2-console) — util para verificar persistencia
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
